
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEXUS AI Login</title>

<link rel="stylesheet" href="styles.css">
<link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css"/>

<style>

/* LOGIN SECTION */

.login-container{
display:flex;
justify-content:center;
align-items:center;
height:70vh;
}

.login-card{
width:380px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
padding:35px;
border-radius:15px;
box-shadow:0 0 25px rgba(0,0,0,0.7);
text-align:center;
}

.login-card h2{
margin-bottom:20px;
color:white;
}

.input-group{
margin-bottom:15px;
}

.input-group input{
width:100%;
padding:12px;
border:none;
border-radius:8px;
outline:none;
background:#eee;
}

.login-btn{
width:100%;
padding:12px;
border:none;
border-radius:25px;
background:linear-gradient(45deg,#6a5cff,#9b7cff);
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.login-btn:hover{
transform:scale(1.05);
}

.signup-text{
margin-top:12px;
font-size:14px;
color:#ccc;
}

.signup-text a{
color:#9b7cff;
text-decoration:none;
}

</style>

</head>

<body>

<img class="image-gradient" src="gradient.png" alt="gradient">
<div class="layer-blur"></div>

<div class="container">

<header>

<h1 data-aos="fade-down" data-aos-duration="1500" class="logo">🤖 NEXUS AI</h1>

<nav>
<a data-aos="fade-down" data-aos-duration="2000" href="index.html">HOME</a>
<a data-aos="fade-down" data-aos-duration="3000" href="page4.html">PROJECTS</a>
</nav>

<button data-aos="fade-down" data-aos-duration="1500" class="btn-signup"><a href="signup.html">SIGN UP</a></button>


</header>

</div>




<section class="login-container" data-aos="fade-zoom-in" data-aos-duration="2000">

<div class="login-card">

<h2>Login to Nexus AI</h2>

<form>

<div class="input-group">
<input type="email" placeholder="Email Address" required>
</div>

<div class="input-group">
<input type="password" placeholder="Password" required>
</div>

<button class="login-btn">Login</button>

<p class="signup-text">
Don't have an account? <a href="signup.html">Sign Up</a>
</p>

</form>

</div>

</section>


<script src="https://unpkg.com/aos@next/dist/aos.js"></script>

<script>
AOS.init();
</script>


<script>
window.watsonAssistantChatOptions = {
integrationID: "7a2a997c-daaa-47f0-b4b2-04ba6afbe5e1",
region: "au-syd",
serviceInstanceID: "c3ad61a8-6597-4be3-867e-fedeff9ae609",
onLoad: async (instance) => { await instance.render(); }
};

setTimeout(function(){
const t=document.createElement('script');
t.src="https://web-chat.global.assistant.watson.appdomain.cloud/versions/" +
(window.watsonAssistantChatOptions.clientVersion || 'latest') +
"/WatsonAssistantChatEntry.js";
document.head.appendChild(t);
});
</script>


<footer>

<p>© 2025 Nexus.AI •</p>
<p> Crafted with ❤️ by Krithika Meenakshi</p>





</footer>

</body>
</html>
