<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Team</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
    <style>
      .core-team-section {
        margin: 1rem auto 0 auto;
        max-width: 800px;
        background: rgba(30,30,30,0.7);
        border-radius: 2rem;
        padding: 3rem 4rem;
        box-shadow: 0 0 40px #0008;
      }
      .core-team-title {
        font-size: 2.5rem;
        letter-spacing: 0.1em;
        margin-bottom: 2rem;
        color: #e7e7e7;
        text-align: center;
      }
      .core-team-list {
        display: flex;
        flex-wrap: wrap;
        gap: 2rem;
        justify-content: center;
      }
      .core-team-member {
        background: #181818;
        border-radius: 1rem;
        padding: 1.5rem 1rem;
        box-shadow: 0 0 20px #000a;
        text-align: center;
        width: 180px;
      }
      .core-team-member img {
        width: 100px;
        height: 100px;
        object-fit: cover;
        border-radius: 50%;
        border: 2px solid #7f42a7;
        margin-bottom: 1rem;
        background: #222;
      }
      .core-team-member .name {
        font-weight: bold;
        font-size: 1.1rem;
        color: #e7e7e7;
      }
      .core-team-member .role {
        color: #a7a7a7;
        font-size: 0.95rem;
        margin-top: 0.3rem;
      }
      @media (max-width: 600px) {
        .core-team-section { padding: 1rem; }
        .core-team-list { gap: 1rem; }
        .core-team-member { width: 100%; }
      }
    </style>
</head>
<body>
    <img class="image-gradient" src="gradient.png" alt="gradient">
    <div class="layer-blur"></div>

    <div class="container">
        <header>
            <h1 data-aos="fade-down" data-aos-duration="1500" class="logo">NEXUS.AI</h1>
            <button data-aos="fade-down" data-aos-duration="1500" class="btn-signup">SIGN UP</button>
        </header>

        <main>
            <div class="content">
                <div data-aos="fade-zoom-in"
                    data-aos-easing="ease-in-back"
                    data-aos-delay="300"
                    data-aos-offset="0" data-aos-duration="1500" class="tag-box">
                    <div class="tag">📊</div>
                </div>
                <h1 data-aos="fade-zoom-in"
                    data-aos-easing="ease-in-back"
                    data-aos-delay="300"
                    data-aos-offset="0" data-aos-duration="2000">CORE TEAM</h1>
                <div class="img-box" data-aos="fade-zoom-in"
                    data-aos-easing="ease-in-back"
                    data-aos-delay="300"
                    data-aos-offset="0" data-aos-duration="2500">
                    
                </div>
            </div>

            
            <section class="core-team-section" data-aos="fade-up" data-aos-duration="2000">
                <div class="core-team-title">Meet Our Exclusive Team !</div>
                <div class="core-team-list">
                    <div class="core-team-member">
                        <img src="https://cdn-icons-png.flaticon.com/512/6997/6997662.png" alt="Krithika Meenakshi">
                        <div class="name">Krithika Meenakshi</div>
                        <div class="role">President</div>
                    </div>
                    <div class="core-team-member">
                        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQIf4R5qPKHPNMyAqV-FjS_OTBB8pfUV29Phg&s" alt="S C">
                        <div class="name">Unknown</div>
                        <div class="role">Vice-President</div>
                    </div>
                    <div class="core-team-member">
                        <img src="https://cdn-icons-png.flaticon.com/512/6833/6833605.png" alt="Vartika">
                        <div class="name">Unknown</div>
                        <div class="role">Community Manager</div>
                    </div>
                    <div class="core-team-member">
                        <img src="https://cdn-icons-png.freepik.com/512/522/522272.png" alt="N K">
                        <div class="name">Unknown</div>
                        <div class="role">Event Head</div>
                    </div>
                    <div class="core-team-member">
                        <img src="https://img.freepik.com/premium-vector/boy-icon-style_822882-6931.jpg" alt="P M">
                        <div class="name">Unknwown</div>
                        <div class="role">Design Lead</div>
                </div>
            </section>
            
         
        </main>
    </div>

    <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
      AOS.init();
    </script>



<footer>
    <p>© 2025 Nexus.AI • contact us: nexus.ai.@gmail.com</p>

    </div>
  </footer>
</footer>
  
</body>
</html>
